<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="favGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0066FF" />
      <stop offset="100%" stop-color="#00D4FF" />
    </linearGradient>
  </defs>

  <!-- Dark rounded background for clean display on dark/light browser themes -->
  <rect width="32" height="32" rx="6" fill="#0F172A" />

  <!-- Bold, simplified mark scaled to fill the 32x32 area -->
  <g fill="none" stroke="url(#favGrad)" stroke-linecap="round" stroke-linejoin="round">
    <!-- Main Outer Loop -->
    <path d="M 12 6 C 22 6 26 11 26 16 C 26 21 22 26 12 26 L 7 26 L 7 6 Z" stroke-width="3.5" />
    
    <!-- Simplified Inner Core Bar -->
    <line x1="7" y1="16" x2="18" y2="16" stroke-width="3.5" />
  </g>

  <!-- High-contrast core dot -->
  <circle cx="18" cy="16" r="2.5" fill="#00D4FF" />
</svg>
