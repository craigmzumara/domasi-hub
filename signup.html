<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Domasi Hub</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' stop-color='%230066FF'/><stop offset='100%' stop-color='%2300D4FF'/></linearGradient></defs><rect width='32' height='32' rx='6' fill='%230F172A'/><path d='M 12 6 C 22 6 26 11 26 16 C 26 21 22 26 12 26 L 7 26 L 7 6 Z' fill='none' stroke='url(%23g)' stroke-width='3.5' stroke-linecap='round' stroke-linejoin='round'/><line x1='7' y1='16' x2='18' y2='16' stroke='url(%23g)' stroke-width='3.5' stroke-linecap='round'/><circle cx='18' cy='16' r='2.5' fill='%2300D4FF'/></svg>" />
</head>
<body>

    <header class="main-header">
      <div class="logo">
    <h1>
        <a href="index.html" class="logo-link" aria-label="Domasi Hub Homepage">
            <img src="Logo.svg" alt="Domasi Hub Logo" class="header-logo-img">
        </a>
    </h1>
</div>
        <nav class="main-nav">
            <div class="theme-switch-wrapper">
                <button id="themeToggle" class="theme-toggle-btn" aria-label="Toggle Dark Mode">
                    <span class="toggle-track">
                        <span class="toggle-thumb">
                            <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="4"/>
                                <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
                            </svg>
                            <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                            </svg>
                        </span>
                    </span>
                </button>
            </div>
        </nav>
    </header>

    <main class="auth-container" style="display: flex; align-items: center; justify-content: center; min-height: 80vh;">
        <div class="auth-card" style="max-width: 450px; width: 100%;">
            <h2 style="text-align: center;">Create Account</h2>
            <p class="auth-subtitle" style="text-align: center; margin-bottom: 1.5rem;">Register to unlock the marketplace, printing hub, and accommodation listings.</p>
            
            <form id="signUpForm" novalidate>
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input 
                        type="text" 
                        id="fullName" 
                        placeholder="e.g., John Doe" 
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="regNumber">Registration Number</label>
                    <input 
                        type="text" 
                        id="regNumber" 
                        placeholder="Enter registration ID"
                        required
                        autocomplete="off"
                    >
                    <div id="validationFeedback" class="feedback-message"></div>
                </div>

                <div class="form-group">
                    <label for="whatsappNumber">WhatsApp Number</label>
                    <input 
                        type="tel" 
                        id="whatsappNumber" 
                        placeholder="e.g., 0888123456" 
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Choose a secure password" required>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Repeat your password" required>
                    <div id="passwordFeedback" class="feedback-message"></div>
                </div>

                <button type="submit" class="btn-primary btn-block" style="width: 100%; margin-top: 0.5rem;">Register Account</button>
            </form>

            <div class="auth-switch" style="text-align: center; margin-top: 1.25rem;">
                <p>Already registered? <a href="signin.html" style="color: var(--primary-color); font-weight: 600; text-decoration: none;">Sign In</a></p>
            </div>
        </div>
    </main>

    <footer class="main-footer">
        <p>&copy; 2026 Domasi Hub. An Independent Student Innovation.</p>
    </footer>

    <script src="auth.js"></script>
    <script src="theme.js"></script>
</body>
</html>
