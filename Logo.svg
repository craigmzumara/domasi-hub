<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="100%" height="100%">
  <defs>
    <!-- Smooth gradient matching your modern tech aesthetic -->
    <linearGradient id="hubGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0066FF" />
      <stop offset="100%" stop-color="#00D4FF" />
    </linearGradient>
  </defs>

  <!-- ==================== ICON MARK ==================== -->
  <g transform="translate(10, 10)">
    <!-- Outer abstract 'D' loop / Network node -->
    <path d="M 40,10 
             C 75,10 90,30 90,50 
             C 90,70 75,90 40,90 
             L 20,90 
             L 20,10 
             Z" 
          fill="none" 
          stroke="url(#hubGradient)" 
          stroke-width="8" 
          stroke-linecap="round" 
          stroke-linejoin="round" />
          
    <!-- Inner 'H' bridge / Central Hub intersection dot -->
    <path d="M 20,50 L 55,50" 
          fill="none" 
          stroke="url(#hubGradient)" 
          stroke-width="8" 
          stroke-linecap="round" />
          
    <path d="M 55,30 L 55,70" 
          fill="none" 
          stroke="url(#hubGradient)" 
          stroke-width="8" 
          stroke-linecap="round" />

    <!-- Central dynamic network pulse point -->
    <circle cx="55" cy="50" r="7" fill="#00D4FF" />
  </g>

  <!-- ==================== TYPOGRAPHY ==================== -->
  <!-- "Domasi" - Heavy, authoritative geometric branding -->
  <text x="130" y="65" 
        font-family="system-ui, -apple-system, sans-serif" 
        font-size="42px" 
        font-weight="800" 
        letter-spacing="-0.5px" 
        fill="currentColor">Domasi</text>

  <!-- "Hub" - High-contrast tech modifier accent -->
  <text x="292" y="65" 
        font-family="system-ui, -apple-system, sans-serif" 
        font-size="42px" 
        font-weight="300" 
        letter-spacing="0px" 
        fill="url(#hubGradient)">Hub</text>

  <!-- Sub-label micro-text aligning with campus services -->
  <text x="132" y="92" 
        font-family="system-ui, -apple-system, sans-serif" 
        font-size="13px" 
        font-weight="600" 
        letter-spacing="3.5px" 
        opacity="0.7"
        fill="currentColor">CAMPUS UTILITY PLATFORM</text>
</svg>