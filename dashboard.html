<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background-color: #d8d5d5; /* black background */
      color: #0c0101;            /* white text */
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      background-color: #111;
      border-bottom: 1px solid #333;
    }

    header h2 {
      margin: 0;
      color: #fff;
    }

    .logout-btn {
      padding: 0.5rem 1rem;
      background: #007bff; /* blue background */
      color: #fff;         /* white text */
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
    }

    .logout-btn:hover {
      background: #0056b3; /* darker blue on hover */
    }

    #usersContainer {
      padding: 2rem;
    }

    .user-block {
      border: 1px solid #444;
      padding: 1rem;
      margin-bottom: 1rem;
      background-color: #222;
      border-radius: 8px;
    }

    .user-block h3 {
      margin-top: 0;
      color: #fff;
    }

    .user-block p {
      color: #ddd;
    }

    .user-block button {
      margin-left: 0.5rem;
      padding: 0.3rem 0.7rem;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    .user-block button:first-child {
      background: #28a745; /* green for edit */
      color: #fff;
    }

    .user-block button:last-child {
      background: #dc3545; /* red for delete */
      color: #fff;
    }
  </style>
</head>
<body>
  <header>
    <h2>Users and Published Items</h2>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </header>

  <div id="usersContainer"></div>

  <script>
    function logout() {
      localStorage.removeItem('isLoggedIn');
      localStorage.removeItem('username');
      window.location.href = "index.html"; // back to main page
    }

    async function loadUsers() {
      try {
        const res = await fetch('/api/admin/users');
        const data = await res.json();

        const container = document.getElementById('usersContainer');
        container.innerHTML = '';

        data.forEach(user => {
          const userDiv = document.createElement('div');
          userDiv.className = 'user-block';
          userDiv.innerHTML = `<h3>${user.username}</h3>`;

          if (user.marketplace_id) {
            const itemDiv = document.createElement('div');
            itemDiv.innerHTML = `
              <p>${user.title}</p>
              <button onclick="editItem(${user.marketplace_id})">Edit</button>
              <button onclick="deleteItem(${user.marketplace_id})">Delete</button>
            `;
            userDiv.appendChild(itemDiv);
          }

          container.appendChild(userDiv);
        });
      } catch (err) {
        console.error("Error loading users:", err);
      }
    }

    async function deleteItem(id) {
      await fetch('/api/admin/item/' + id, { method: 'DELETE' });
      loadUsers();
    }

    function editItem(id) {
      const newTitle = prompt("Enter new title:");
      const newDesc = prompt("Enter new description:");
      fetch('/api/admin/item/' + id, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title: newTitle, description: newDesc })
      }).then(loadUsers);
    }

    loadUsers();
  </script>
</body>
</html>
