<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Domasi Hub</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' stop-color='%230066FF'/><stop offset='100%' stop-color='%2300D4FF'/></linearGradient></defs><rect width='32' height='32' rx='6' fill='%230F172A'/><path d='M 12 6 C 22 6 26 11 26 16 C 26 21 22 26 12 26 L 7 26 L 7 6 Z' fill='none' stroke='url(%23g)' stroke-width='3.5' stroke-linecap='round' stroke-linejoin='round'/><line x1='7' y1='16' x2='18' y2='16' stroke='url(%23g)' stroke-width='3.5' stroke-linecap='round'/><circle cx='18' cy='16' r='2.5' fill='%2300D4FF'/></svg>" />
  <style>
    :root {
      --bg-dark: #121212;
      --bg-card: #1e1e1e;
      --border-color: #333;
      --text-main: #f0f0f0;
      --text-muted: #aaa;
      --danger-color: #dc3545;
      --warning-color: #ffc107;
      --success-color: #28a745;
      --primary-color: #007bff;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-main);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      background-color: #1a1a1a;
      border-bottom: 1px solid var(--border-color);
    }

    .admin-container {
      max-width: 1200px;
      margin: 2rem auto;
      padding: 0 1rem;
    }

    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .admin-table-wrapper {
      background: var(--bg-card);
      border-radius: 8px;
      border: 1px solid var(--border-color);
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    th, td {
      padding: 1rem;
      border-bottom: 1px solid var(--border-color);
    }

    th {
      background-color: #252525;
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      font-size: 0.8rem;
    }

    tr:hover {
      background-color: #282828;
    }

    .badge {
      padding: 0.3rem 0.6rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: bold;
      text-transform: uppercase;
    }

    .badge-marketplace { background: #0d6efd; color: white; }
    .badge-printing { background: #6f42c1; color: white; }
    .badge-accommodation { background: #198754; color: white; }

    .action-btn {
      padding: 0.4rem 0.8rem;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      margin-right: 0.3rem;
      transition: opacity 0.2s;
    }

    .action-btn:hover { opacity: 0.85; }
    .btn-edit { background: var(--warning-color); color: #000; }
    .btn-delete { background: var(--danger-color); color: #fff; }
    .btn-logout { background: #555; color: #fff; }
  </style>
</head>
<body>

  <header>
    <h2>🛡️ Domasi Hub - Admin Command Center</h2>
    <div>
      <span id="adminUser" style="margin-right: 1rem; color: var(--text-muted);"></span>
      <button class="action-btn btn-logout" onclick="logout()">Logout</button>
    </div>
  </header>

  <main class="admin-container">
    <div class="dashboard-header">
      <h3>Active User Listings & Service Moderation</h3>
      <button class="action-btn btn-edit" onclick="loadAdminDashboard()">🔄 Refresh Data</button>
    </div>

    <div class="admin-table-wrapper">
      <table>
        <thead>
          <tr>
            <th>User</th>
            <th>Category</th>
            <th>Title / Service</th>
            <th>Price (MWK)</th>
            <th>Contact</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="listingsTableBody">
          <tr>
            <td colspan="6" style="text-align: center; padding: 2rem;">Loading listings...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      checkAdminAccess();
    });

    async function checkAdminAccess() {
      let currentUser = (localStorage.getItem('adminUsername') || '').toLowerCase().trim();
      let isLoggedIn = localStorage.getItem('isAdminLoggedIn') === 'true';

      if (!isLoggedIn) {
        const inputUser = prompt("Admin Username:");
        if (!inputUser) { window.location.href = "index.html"; return; }

        const inputPass = prompt("Admin Password:");
        if (!inputPass) { window.location.href = "index.html"; return; }

        try {
          const res = await fetch('http://127.0.0.1:3000/api/admin/signin', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: inputUser, password: inputPass })
          });

          const contentType = res.headers.get("content-type");
          if (!contentType || !contentType.includes("application/json")) {
            alert("Server returned non-JSON response.");
            window.location.href = "index.html";
            return;
          }

          const data = await res.json();

          if (res.ok && data.status === 'success') {
            localStorage.setItem('adminUsername', data.username);
            localStorage.setItem('isAdminLoggedIn', 'true');
            currentUser = data.username;
          } else {
            alert("Access Denied: " + (data.message || "Invalid Admin Credentials"));
            window.location.href = "index.html";
            return;
          }
        } catch (err) {
          console.error("Auth error:", err);
          alert("Error connecting to auth server.");
          window.location.href = "index.html";
          return;
        }
      }

      document.getElementById('adminUser').innerText = `Logged in as: ${currentUser.toUpperCase()}`;
      loadAdminDashboard();
    }

    async function loadAdminDashboard() {
      const tbody = document.getElementById('listingsTableBody');
      tbody.innerHTML = `<tr><td colspan="6" style="text-align: center;">Fetching data from server...</td></tr>`;

      try {
        const res = await fetch('http://127.0.0.1:3000/api/listings');
        const data = await res.json();

        if (data.status === 'success' && data.listings && data.listings.length > 0) {
          tbody.innerHTML = '';
          data.listings.forEach(item => {
            const tr = document.createElement('tr');
            const categoryClass = `badge-${item.category || 'marketplace'}`;

            tr.innerHTML = `
              <td><strong>${item.posted_by || 'Unknown User'}</strong></td>
              <td><span class="badge ${categoryClass}">${item.category || 'General'}</span></td>
              <td>${item.title || 'Untitled Item'}</td>
              <td>${parseFloat(item.price || 0).toLocaleString()} MWK</td>
              <td>${item.contact_number || 'N/A'}</td>
              <td>
                <button class="action-btn btn-edit" onclick="editListing(${item.id})">Edit</button>
                <button class="action-btn btn-delete" onclick="deleteListing(${item.id})">Delete</button>
              </td>
            `;
            tbody.appendChild(tr);
          });
        } else {
          tbody.innerHTML = `<tr><td colspan="6" style="text-align: center;">No active user listings found in database.</td></tr>`;
        }
      } catch (err) {
        console.error("Error loading admin data:", err);
        tbody.innerHTML = `<tr><td colspan="6" style="text-align: center; color: var(--danger-color);">Error connecting to backend API.</td></tr>`;
      }
    }

    async function deleteListing(id) {
      if (!confirm("Are you sure you want to permanently delete this listing?")) return;

      try {
        const response = await fetch(`http://127.0.0.1:3000/api/listings/${id}`, {
          method: 'DELETE'
        });
        const result = await response.json();

        if (response.ok) {
          alert("Item successfully purged from platform.");
          loadAdminDashboard();
        } else {
          alert("Delete failed: " + (result.error || "Server error"));
        }
      } catch (err) {
        console.error("Delete request error:", err);
        alert("Failed to send delete request to backend server.");
      }
    }

    async function editListing(id) {
      const newTitle = prompt("Update Title / Item Name:");
      if (newTitle === null) return;

      const newPrice = prompt("Update Price (MWK):");
      if (newPrice === null) return;

      try {
        const response = await fetch(`http://127.0.0.1:3000/api/listings/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title: newTitle, price: parseFloat(newPrice) || 0 })
        });

        if (response.ok) {
          alert("Listing details updated!");
          loadAdminDashboard();
        } else {
          alert("Update failed.");
        }
      } catch (err) {
        console.error("Update request error:", err);
        alert("Failed to send update request.");
      }
    }

    function logout() {
      localStorage.removeItem('isAdminLoggedIn');
      localStorage.removeItem('adminUsername');
      window.location.href = "index.html";
    }
  </script>
</body>
</html>
