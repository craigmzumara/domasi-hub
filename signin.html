<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Domasi Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <div class="logo">
            <h1>
                <a href="index.html" style="text-decoration: none;">
                    <img src="Logo.svg" alt="Domasi Hub Logo" style="height:48px;">
                </a>
            </h1>
        </div>
        <nav class="main-nav">
            <div class="theme-switch-wrapper">
                <button id="themeToggle" class="theme-toggle-btn" aria-label="Toggle Dark Mode">
                    <span class="toggle-track">
                        <span class="toggle-thumb">
                            <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="4"/>
                                <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
                            </svg>
                            <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                            </svg>
                        </span>
                    </span>
                </button>
            </div>
        </nav>
    </header>

    <main class="auth-container" style="display: flex; align-items: center; justify-content: center; min-height: 75vh;">
        <div class="auth-card" style="max-width: 420px; width: 100%;">
            <h2 style="text-align: center;">Welcome Back</h2>
            <p class="auth-subtitle" style="text-align: center; margin-bottom: 1.5rem;">Sign in to access your student utility network.</p>
            
            <form id="signInForm" novalidate>
                <div class="form-group">
                    <label for="regNumber">Registration Number</label>
                    <input 
                        type="text" 
                        id="regNumber" 
                        placeholder="Enter your student ID" 
                        required
                        autocomplete="off"
                    >
                    <div id="validationFeedback" class="feedback-message"></div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="btn-primary btn-block" style="width: 100%; margin-top: 0.5rem;">Sign In</button>
            </form>

            <div class="auth-switch" style="text-align: center; margin-top: 1.25rem;">
                <p>New to the platform? <a href="signup.html" style="color: var(--primary-color); font-weight: 600; text-decoration: none;">Create an account</a></p>
            </div>
        </div>
    </main>

    <footer class="main-footer">
        <p>&copy; 2026 Domasi Hub. An Independent Student Innovation.</p>
    </footer>

    <script src="auth-signin.js"></script>
    <script src="theme.js"></script>
</body>
</html>
