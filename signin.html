<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Domasi Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 1. HEADER & NAVIGATION -->
    <header class="main-header">
        <div class="logo">
            <h1><a href="index.html" style="color: white; text-decoration: none;">Domasi Hub</a></h1>
        </div>
        <nav class="main-nav">
            <!-- Modern Styled Theme Toggle Container -->
            <div class="theme-switch-wrapper">
                <button id="themeToggle" class="theme-toggle-btn" aria-label="Toggle Dark Mode">
                    <span class="toggle-track">
                        <span class="toggle-thumb"></span>
                    </span>
                </button>
            </div>
            <a href="index.html" class="btn-secondary">Home</a>
        </nav>
    </header>

    <!-- MAIN SEGMENT CONTAINER -->
    <main class="auth-container">
        <!-- AUTHENTICATION CARD BLOCK -->
        <div class="auth-card">
            <div class="auth-header">
                <h3>Welcome Back</h3>
                <p class="auth-subtitle">Sign in to access your student utilities dashboard</p>
            </div>

            <form id="signInForm" class="auth-form" novalidate>
                <!-- Registration Number Field (Gatekeeper) -->
                <div class="form-group">
                    <label for="regNumber">Registration Number</label>
                    <input 
                        type="text" 
                        id="regNumber" 
                        name="regNumber" 
                        placeholder="e.g., BED/SCI/473/23" 
                        required
                        autocomplete="off"
                    >
                    <!-- Holds live validation text message -->
                    <div id="validationFeedback" class="feedback-message"></div>
                </div>

                <!-- Password Field -->
                <div class="form-group">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Enter your account password" 
                        required
                    >
                </div>

                <button type="submit" class="btn-primary btn-block">Sign In</button>
            </form>

            <div class="auth-switch">
                <p>New to the network? <a href="signup.html">Create an account</a></p>
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="main-footer">
        <p>&copy; 2026 Domasi Hub.</p>
    </footer>

    <!-- Core Theme Toggle Script Handlers -->
    <script src="auth-signin.js"></script>
    <script src="theme.js"></script>
</body>
</html>
